apiVersion: apps/v1
kind: Deployment
metadata:
  name: ##TF_VAR_prefix##-dep
  labels:
      app: ##TF_VAR_prefix##-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ##TF_VAR_prefix##-rest
  template:
    metadata:
      labels:
        app: ##TF_VAR_prefix##-rest
    spec:
      containers:
      - name: app
        image: ##DOCKER_PREFIX##/##TF_VAR_prefix##-rest:##DOCKER_IMG_VERSION##
        ports:
        - containerPort: 8080
          name: app-port
        env:
{%- if language == "java" %}
{%- if java_framework == "helidon" or java_framework == "helidon4" %}
        - name: JAVAX_SQL_DATASOURCE_DS1_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: jdbc_url
{%- endif %}
        - name: JDBC_URL
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: jdbc_url
{%- else %}        
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: db_url
{%- endif %}      
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: db_password
#        - name: POD_IP
#          valueFrom:
#            fieldRef:
#              fieldPath: status.podIP
{%- if db_type == "nosql" %}
        - name: TF_VAR_compartment_ocid
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix###-db-secret
              key: TF_VAR_compartment_ocid
        - name: TF_VAR_nosql_endpoint
          valueFrom:
            secretKeyRef:
              name: ##TF_VAR_prefix##-db-secret
              key: TF_VAR_nosql_endpoint
{%- endif %}
{%- if python_framework in [ "langgraph", "responses" ] %}
        - name: TF_VAR_region
          valueFrom:
            configMapKeyRef:
              name: tf-env-configmap
              key: TF_VAR_region
        - name: TF_VAR_compartment_ocid
          valueFrom:
            configMapKeyRef:
              name: tf-env-configmap
              key: TF_VAR_compartment_ocid
{%- endif %}
{%- if python_framework == "langgraph" %}
        - name: MCP_SERVER_URL
          value: "http://##TF_VAR_prefix##-mcp-server-service:2025/mcp"
{%- elif python_framework == "responses" %}
        - name: TF_VAR_project_ocid
          valueFrom:
            configMapKeyRef:
              name: tf-env-configmap
              key: TF_VAR_project_ocid
        - name: MCP_SERVER_URL
          value: "http://##TF_VAR_gateway_ip##/##TF_VAR_prefix##/mcp_server/mcp"
{%- endif %}
      imagePullSecrets:
      - name: ocirsecret        
---
apiVersion: v1
kind: Service
metadata:
  name: ##TF_VAR_prefix##-rest-service
spec:
  selector:
    app: ##TF_VAR_prefix##-rest
  ports:
  - name: http-service-port
    protocol: TCP
    port: 80
    targetPort: app-port
---